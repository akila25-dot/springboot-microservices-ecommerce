server:
  port: 8761

spring:
  application:
    name: discovery_server

# Optional: expose health/info for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always


eureka:
  client:
    # Eureka server does not register itself
    register-with-eureka: false
    fetch-registry: false
  server:
    # Optional: tune eviction/renewal for local dev
    enable-self-preservation: true
    eviction-interval-timer-in-ms: 60000
